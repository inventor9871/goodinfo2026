<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 資訊查詢系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="glass-layer"></div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <h1 class="gradient-text">ETF 資訊查詢</h1>
            <p>快速查詢即時股利、殖利率與趨勢分析</p>
        </header>

        <div class="controls-wrapper">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="輸入 ETF 代號 (例如：0050) 進行單筆分析" autocomplete="off">
                <button id="searchBtn" aria-label="搜尋">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </button>
            </div>
            <div class="filter-box">
                <select id="monthSelect">
                    <option value="">全部除息月份</option>
                    <option value="01">1月</option>
                    <option value="02">2月</option>
                    <option value="03">3月</option>
                    <option value="04">4月</option>
                    <option value="05">5月</option>
                    <option value="06">6月</option>
                    <option value="07">7月</option>
                    <option value="08">8月</option>
                    <option value="09">9月</option>
                    <option value="10">10月</option>
                    <option value="11">11月</option>
                    <option value="12">12月</option>
                </select>
            </div>
        </div>

        <div id="loading" class="state-message">
            <div class="spinner"></div>
            <p>載入資料中...</p>
        </div>

        <div id="errorBox" class="state-message hidden error-message">
            <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <p>找不到該代號的 ETF 資訊，請重新輸入</p>
            <button id="errorBackBtn" class="back-btn" style="margin-top: 1rem;">返回列表</button>
        </div>

        <!-- All Data Table -->
        <div id="allDataBox" class="table-container hidden">
            <table class="market-table">
                <thead>
                    <tr>
                        <th>代號</th>
                        <th>名稱</th>
                        <th>成交價</th>
                        <th id="dateHeader" class="sortable">除息交易日 <span class="sort-icon"></span></th>
                        <th>合計股利</th>
                        <th id="yieldHeader" class="sortable">年化合計殖利率 <span class="sort-icon"></span></th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- populated by js -->
                </tbody>
            </table>
        </div>

        <!-- Single Result Card -->
        <div id="resultCard" class="result-card hidden">
            <button id="backBtn" class="back-btn">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                顯示全部
            </button>

            <div class="card-header">
                <div class="etf-identity">
                    <span class="etf-code" id="res-code">0000</span>
                    <h2 class="etf-name" id="res-name">--</h2>
                </div>
            </div>
            
            <div class="card-grid">
                <div class="data-group">
                    <span class="data-label">成交價</span>
                    <span class="data-value" id="res-price">--</span>
                </div>
                <div class="data-group highlight">
                    <span class="data-label">合計股利</span>
                    <span class="data-value" id="res-dividend">--</span>
                </div>
                <div class="data-group highlight-accent">
                    <span class="data-label">年化合計殖利率</span>
                    <span class="data-value" id="res-yield">--</span>
                </div>
                <div class="data-group">
                    <span class="data-label">除息交易日</span>
                    <span class="data-value" id="res-date">--</span>
                </div>
            </div>

            <div class="analysis-section">
                <h3>
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    AI 趨勢分析
                </h3>
                <p id="res-analysis">--</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
